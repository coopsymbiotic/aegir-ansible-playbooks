---

- name: Create the htpasswd directory if necessary
  file:
    path: "/var/aegir/config/passwords.d/"
    state: directory
    owner: "aegir"
    group: "www-data"
    mode: "0750"

- name: Create or update the htpasswd file
  community.general.htpasswd:
    path: "/var/aegir/config/passwords.d/{{ inventory_hostname }}"
    name: "{{ http_basic_auth_username }}"
    password: "{{ http_basic_auth_username }}"
    owner: "aegir"
    group: "www-data"
    mode: "0640"
